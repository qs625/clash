name: Build Debian Package

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build-deb:
        name: Build .deb on Ubuntu
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.15.0
                  cache: pnpm

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    build-essential \
                    curl \
                    file \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libssl-dev \
                    libwebkit2gtk-4.1-dev \
                    libxdo-dev \
                    patchelf \
                    wget

            - name: Install JavaScript dependencies
              run: pnpm install --frozen-lockfile

            - name: Download sidecars and runtime resources
              run: pnpm prepare:check

            - name: Build Tauri Debian bundle
              run: >-
                  pnpm tauri build --bundles deb --ci
                  -c '{"bundle":{"createUpdaterArtifacts":false}}'

            - name: Upload Debian artifact
              uses: actions/upload-artifact@v4
              with:
                  name: clash-nyanpasu-deb-${{ github.ref_name }}
                  path: backend/target/release/bundle/deb/*.deb
                  if-no-files-found: error

            - name: Upload Debian package to GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: backend/target/release/bundle/deb/*.deb
                  fail_on_unmatched_files: true

    sync-my-clash-aur-template:
        name: Sync myclash AUR template
        needs: build-deb
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout main branch
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Regenerate myclash AUR template
              shell: bash
              run: |
                  set -euo pipefail

                  version="${GITHUB_REF_NAME#v}"
                  asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Clash.Nyanpasu_${version}_amd64.deb"
                  asset_file="/tmp/Clash.Nyanpasu_${version}_amd64.deb"
                  checksum=""

                  for attempt in 1 2 3 4 5; do
                    if curl -fL --retry 3 --retry-delay 5 -o "${asset_file}" "${asset_url}"; then
                      checksum="$(sha256sum "${asset_file}" | awk '{print $1}')"
                      break
                    fi
                  done

                  if [ -z "${checksum}" ]; then
                    echo "Failed to download ${asset_url}" >&2
                    exit 1
                  fi

                  mkdir -p packaging/aur/myclash

                  {
                    printf '%s\n' 'pkgname=myclash'
                    printf '%s\n' '_pkgname=clash-nyanpasu'
                    printf '%s\n' "_reltag=${GITHUB_REF_NAME}"
                    printf '%s\n' "pkgver=${version}"
                    printf '%s\n' 'pkgrel=1'
                    printf '%s\n' 'pkgdesc="A Clash GUI based on tauri. Clash Nyanpasu! (qs625 build)"'
                    printf '%s\n' "arch=('x86_64')"
                    printf '%s\n' 'url="https://github.com/qs625/clash"'
                    printf '%s\n' "license=('GPL3')"
                    printf '%s\n' "options=('!strip' '!debug')"
                    printf '%s\n' "depends=('webkit2gtk-4.1' 'gtk3' 'libayatana-appindicator' 'mihomo')"
                    printf '%s\n' "conflicts=('clash-nyanpasu-git' 'clash-nyanpasu-appimage' 'clash-nyanpasu' 'clash-nyanpasu-bin' 'clash-nyanpasu-qs-bin')"
                    printf '%s\n' "provides=('clash-nyanpasu')"
                    printf '%s\n' "optdepends=('clash-rs: custom protocol network proxy, coding with rust')"
                    printf '%s\n' 'source=("${_pkgname}-${pkgver}-x86_64.deb::https://github.com/qs625/clash/releases/download/${_reltag}/Clash.Nyanpasu_${pkgver}_amd64.deb")'
                    printf '%s\n' "sha256sums=('${checksum}')"
                    printf '\n'
                    printf '%s\n' 'package() {'
                    printf '%s\n' '    tar xpf data.tar.gz -C "${pkgdir}"'
                    printf '%s\n' '    rm -f "${pkgdir}/usr/bin/clash"'
                    printf '%s\n' '    rm -f "${pkgdir}/usr/bin/mihomo"'
                    printf '%s\n' '    rm -f "${pkgdir}/usr/bin/clash-rs"'
                    printf '%s\n' '    rm -f "${pkgdir}/usr/bin/mihomo-alpha"'
                    printf '%s\n' '}'
                  } > packaging/aur/myclash/PKGBUILD

                  {
                    printf '%s\n' 'pkgbase = myclash'
                    printf '%s\n' '    pkgdesc = A Clash GUI based on tauri. Clash Nyanpasu! (qs625 build)'
                    printf '%s\n' "    pkgver = ${version}"
                    printf '%s\n' '    pkgrel = 1'
                    printf '%s\n' '    url = https://github.com/qs625/clash'
                    printf '%s\n' '    arch = x86_64'
                    printf '%s\n' '    license = GPL3'
                    printf '%s\n' '    depends = webkit2gtk-4.1'
                    printf '%s\n' '    depends = gtk3'
                    printf '%s\n' '    depends = libayatana-appindicator'
                    printf '%s\n' '    depends = mihomo'
                    printf '%s\n' '    optdepends = clash-rs: custom protocol network proxy, coding with rust'
                    printf '%s\n' '    provides = clash-nyanpasu'
                    printf '%s\n' '    conflicts = clash-nyanpasu-git'
                    printf '%s\n' '    conflicts = clash-nyanpasu-appimage'
                    printf '%s\n' '    conflicts = clash-nyanpasu'
                    printf '%s\n' '    conflicts = clash-nyanpasu-bin'
                    printf '%s\n' '    conflicts = clash-nyanpasu-qs-bin'
                    printf '%s\n' '    options = !strip'
                    printf '%s\n' '    options = !debug'
                    printf '%s\n' "    source = clash-nyanpasu-${version}-x86_64.deb::https://github.com/qs625/clash/releases/download/${GITHUB_REF_NAME}/Clash.Nyanpasu_${version}_amd64.deb"
                    printf '%s\n' "    sha256sums = ${checksum}"
                    printf '\n'
                    printf '%s\n' 'pkgname = myclash'
                  } > packaging/aur/myclash/.SRCINFO

            - name: Commit template update
              shell: bash
              run: |
                  set -euo pipefail

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add packaging/aur/myclash/PKGBUILD packaging/aur/myclash/.SRCINFO

                  if git diff --cached --quiet; then
                    echo "myclash AUR template already up to date"
                    exit 0
                  fi

                  git commit -m "pkgbuild: sync myclash template for ${GITHUB_REF_NAME}"
                  git push origin HEAD:main
