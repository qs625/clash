name: Build Debian Package

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build-deb:
        name: Build .deb on Ubuntu
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.15.0
                  cache: pnpm

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    build-essential \
                    curl \
                    file \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libssl-dev \
                    libwebkit2gtk-4.1-dev \
                    libxdo-dev \
                    patchelf \
                    wget

            - name: Install JavaScript dependencies
              run: pnpm install --frozen-lockfile

            - name: Download sidecars and runtime resources
              run: pnpm prepare:check

            - name: Build Tauri Debian bundle
              run: >-
                  pnpm tauri build --bundles deb --ci
                  -c '{"bundle":{"createUpdaterArtifacts":false}}'

            - name: Upload Debian artifact
              uses: actions/upload-artifact@v4
              with:
                  name: clash-nyanpasu-deb-${{ github.ref_name }}
                  path: backend/target/release/bundle/deb/*.deb
                  if-no-files-found: error

            - name: Upload Debian package to GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: backend/target/release/bundle/deb/*.deb
                  fail_on_unmatched_files: true
